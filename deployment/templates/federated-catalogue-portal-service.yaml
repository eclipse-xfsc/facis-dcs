{{- if and .Values.federatedCatalogue.enabled .Values.federatedCatalogue.portal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-federated-catalogue-portal
  labels:
    app.kubernetes.io/name: federated-catalogue-portal
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.federatedCatalogue.portal.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.federatedCatalogue.portal.service.port | default 8088 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: federated-catalogue-portal
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
