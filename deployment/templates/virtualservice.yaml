{{- if .Values.istio.enabled -}}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
spec:
  hosts:
    {{- range .Values.istio.hosts }}
    - {{ . | quote }}
    {{- end }}
  gateways:
    {{- range .Values.istio.gateways }}
    - {{ . | quote }}
    {{- end }}
  http:
    {{- /* Keycloak route when enabled with route.path */}}
    {{- if and .Values.keycloak.enabled .Values.keycloak.route.path }}
    - name: keycloak
      match:
        - uri:
            prefix: {{ include "digital-contracting-service.keycloakRoutePath" . }}
      route:
        - destination:
            host: {{ .Release.Name }}-keycloak
            port:
              number: {{ .Values.keycloak.service.port | int }}
    {{- end }}
    {{- /* DCS application route */}}
    - name: dcs
      match:
        - uri:
            prefix: {{ include "digital-contracting-service.baseRoutePath" . }}
      route:
        - destination:
            host: {{ include "digital-contracting-service.fullname" . }}
            port:
              number: {{ .Values.service.port | int }}
{{- end }}
