apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-neo4j
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: bolt
      port: {{ .Values.service.boltPort }}
      targetPort: bolt
  selector:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/instance: {{ .Release.Name }}
