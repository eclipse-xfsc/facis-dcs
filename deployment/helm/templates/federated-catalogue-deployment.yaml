{{- if .Values.federatedCatalogue.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-federated-catalogue
spec:
  replicas: {{ .Values.federatedCatalogue.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: federated-catalogue
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: federated-catalogue
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: fc-service
          image: "{{ .Values.federatedCatalogue.image.repository }}:{{ .Values.federatedCatalogue.image.tag }}"
          imagePullPolicy: {{ .Values.federatedCatalogue.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8081
          env:
            # Neo4j / Graph Store
            - name: GRAPHSTORE_URI
              value: {{ .Values.federatedCatalogue.neo4j.uri | default (printf "bolt://%s-neo4j:%d" .Release.Name (.Values.neo4j.service.boltPort | default 7687 | int)) | quote }}
            - name: GRAPHSTORE_USER
              value: {{ .Values.federatedCatalogue.neo4j.username | default .Values.neo4j.auth.username | default "neo4j" | quote }}
            - name: GRAPHSTORE_PASSWORD
              value: {{ .Values.federatedCatalogue.neo4j.password | default .Values.neo4j.auth.password | default "neo4j" | quote }}
            - name: GRAPHSTORE_QUERY_TIMEOUT_IN_SECONDS
              value: "5"
            # PostgreSQL (fc-service uses its own database)
            {{- if .Values.federatedCatalogue.database.url }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.federatedCatalogue.database.url | quote }}
            {{- else if .Values.postgresql.enabled }}
            - name: SPRING_DATASOURCE_URL
              value: {{ printf "jdbc:postgresql://%s-postgresql:%d/%s" .Release.Name (.Values.postgresql.service.port | default 5432 | int) (.Values.federatedCatalogue.database.name | default "fc") | quote }}
            {{- end }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.federatedCatalogue.database.username | default .Values.postgresql.auth.username | default "dcs" | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.federatedCatalogue.database.password | default .Values.postgresql.auth.password | default "dcs" | quote }}
            # Keycloak
            {{- $keycloakEnabled := true }}
            {{- if hasKey .Values.federatedCatalogue "security" }}
            {{- $keycloakEnabled = .Values.federatedCatalogue.security.enabled | default true }}
            {{- end }}
            - name: KEYCLOAK_ENABLED
              value: {{ $keycloakEnabled | quote }}
            {{- if $keycloakEnabled }}
            {{- /* Internal Keycloak URL for API calls */}}
            {{- $keycloakInternalUrl := "" }}
            {{- /* External issuer URL for JWT validation (must match token issuer claim) */}}
            {{- $keycloakIssuerUrl := "" }}
            {{- if .Values.federatedCatalogue.keycloak.authServerUrl }}
            {{- $keycloakInternalUrl = .Values.federatedCatalogue.keycloak.authServerUrl }}
            {{- $keycloakIssuerUrl = .Values.federatedCatalogue.keycloak.authServerUrl }}
            {{- else if .Values.keycloak.enabled }}
            {{- /* Account for keycloak route.path (e.g., /auth) */}}
            {{- $keycloakPath := "" }}
            {{- if .Values.keycloak.route.path }}
            {{- $keycloakPath = printf "/%s" (trimAll "/" .Values.keycloak.route.path) }}
            {{- end }}
            {{- $keycloakInternalUrl = printf "http://%s-keycloak:%d%s" .Release.Name (.Values.keycloak.service.port | default 8080 | int) $keycloakPath }}
            {{- /* Use external URL for issuer if KC_HOSTNAME is set */}}
            {{- $keycloakHost := "" }}
            {{- range .Values.keycloak.extraEnv }}
            {{- if eq .name "KC_HOSTNAME" }}
            {{- $keycloakHost = .value }}
            {{- end }}
            {{- end }}
            {{- if $keycloakHost }}
            {{- $keycloakIssuerUrl = printf "https://%s%s" $keycloakHost $keycloakPath }}
            {{- else }}
            {{- $keycloakIssuerUrl = $keycloakInternalUrl }}
            {{- end }}
            {{- end }}
            {{- if $keycloakInternalUrl }}
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: {{ $keycloakInternalUrl | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: {{ printf "%s/realms/%s" $keycloakIssuerUrl (.Values.federatedCatalogue.keycloak.realm | default "gaia-x") | quote }}
            {{- /* JWK set URI for fetching keys from internal Keycloak */}}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: {{ printf "%s/realms/%s/protocol/openid-connect/certs" $keycloakInternalUrl (.Values.federatedCatalogue.keycloak.realm | default "gaia-x") | quote }}
            {{- end }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.federatedCatalogue.keycloak.realm | default "gaia-x" | quote }}
            - name: KEYCLOAK_RESOURCE
              value: {{ .Values.federatedCatalogue.keycloak.clientId | default "federated-catalogue" | quote }}
            - name: KEYCLOAK_CREDENTIALS_SECRET
              value: {{ .Values.federatedCatalogue.keycloak.clientSecret | default "federated-catalogue-secret" | quote }}
            {{- end }}
            # FC Service config
            - name: FEDERATED_CATALOGUE_VERIFICATION_SIGNATURES
              value: {{ .Values.federatedCatalogue.verifySignatures | default "false" | quote }}
            - name: DATASTORE_FILE_PATH
              value: "/var/lib/fc-service/filestore"
            # Spring actuator endpoints - expose health publicly
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,metrics"
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              value: "always"
            # Server context path for routing
            {{- if .Values.federatedCatalogue.route.path }}
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.federatedCatalogue.route.path | quote }}
            {{- end }}
            {{- with .Values.federatedCatalogue.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.federatedCatalogue.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.federatedCatalogue.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.federatedCatalogue.resources | nindent 12 }}
{{- end }}
