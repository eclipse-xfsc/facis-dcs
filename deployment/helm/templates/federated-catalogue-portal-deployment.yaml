{{- if and .Values.federatedCatalogue.enabled .Values.federatedCatalogue.portal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-federated-catalogue-portal
spec:
  replicas: {{ .Values.federatedCatalogue.portal.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: federated-catalogue-portal
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: federated-catalogue-portal
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fc-demo-portal
          image: "{{ .Values.federatedCatalogue.portal.image.repository }}:{{ .Values.federatedCatalogue.portal.image.tag }}"
          imagePullPolicy: {{ .Values.federatedCatalogue.portal.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8088
          env:
            # FC Server connection (internal)
            - name: FEDERATED_CATALOGUE_BASE_URI
              value: {{ printf "http://%s-federated-catalogue:%d%s" .Release.Name (.Values.federatedCatalogue.service.port | default 8081 | int) (.Values.federatedCatalogue.route.path | default "") | quote }}
            # Keycloak OAuth2 configuration
            {{- $keycloakPath := "" }}
            {{- if .Values.keycloak.route.path }}
            {{- $keycloakPath = printf "/%s" (trimAll "/" .Values.keycloak.route.path) }}
            {{- end }}
            {{- /* External Keycloak URL for browser redirects */}}
            {{- $keycloakHost := "" }}
            {{- range .Values.keycloak.extraEnv }}
            {{- if eq .name "KC_HOSTNAME" }}
            {{- $keycloakHost = .value }}
            {{- end }}
            {{- end }}
            {{- $keycloakExternalUrl := "" }}
            {{- if $keycloakHost }}
            {{- $keycloakExternalUrl = printf "https://%s%s" $keycloakHost $keycloakPath }}
            {{- else }}
            {{- $keycloakExternalUrl = printf "http://%s-keycloak:%d%s" .Release.Name (.Values.keycloak.service.port | default 8080 | int) $keycloakPath }}
            {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI
              value: {{ printf "%s/realms/%s" $keycloakExternalUrl (.Values.federatedCatalogue.keycloak.realm | default "gaia-x") | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_CLIENT_ID
              value: {{ .Values.federatedCatalogue.portal.keycloak.clientId | default "federated-catalogue" | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_CLIENT_SECRET
              value: {{ .Values.federatedCatalogue.portal.keycloak.clientSecret | default .Values.federatedCatalogue.keycloak.clientSecret | default "federated-catalogue-secret" | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_SCOPE
              value: "openid,profile,email"
            # Server context path
            {{- if .Values.federatedCatalogue.portal.route.path }}
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.federatedCatalogue.portal.route.path | quote }}
            {{- end }}
            {{- with .Values.federatedCatalogue.portal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.federatedCatalogue.portal.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.federatedCatalogue.portal.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.federatedCatalogue.portal.resources | nindent 12 }}
{{- end }}
