replicaCount: 1

image:
  repository: [registry]
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

dockerRegistry:
  create: false
  secretName: "docker-registry"
  server: ""
  username: ""
  password: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8991

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

# Istio VirtualService (optional, for Istio service mesh users)
istio:
  enabled: false
  hosts: []
  gateways: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

customCA:
  enabled: false
  configMapName: ""

hostAliases: []
nodeSelector: {}
tolerations: []
affinity: {}

oidc:
  issuerURL: ""
  clientID: "[oidc-client-id]"
  redirectURI: "[oidc-redirect-uri]"
  logoutRedirectURI: "[oidc-logout-redirect-uri]"
  realm: "gaia-x"
  keycloakScheme: "http"
  issuerURLSecretRef:
    name: ""
    key: "OIDC_ISSUER_URL"

route:
  basePath: "/digital-contracting-service"

paths:
  api: ""
  ui: ""

database:
  url: ""
  port: 5432
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  secretRef:
    name: ""
    key: "DATABASE_URL"

messaging:
  natsURL: ""
  natsPort: 4222
  secretRef:
    name: ""
    key: "NATS_URL"

serviceDiscovery:
  postgresqlHost: ""
  keycloakHost: ""
  natsHost: ""
  keycloakPort: ""

extraEnv: []
extraEnvFrom: []

# Co-deployed dependencies (set enabled: true to include)
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: []
  persistence:
    enabled: false
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources: {}

keycloak:
  enabled: false
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: ""
  route:
    path: ""
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: "/"
    pathType: Prefix
    tls: []
  auth:
    adminUser: admin
    adminPassword: admin
  extraEnv: []
  realm:
    import: false
  resources: {}

nats:
  enabled: false
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 4222
  resources: {}

neo4j:
  enabled: false
  image:
    repository: neo4j
    tag: "5.18-community"
    pullPolicy: IfNotPresent
  service:
    httpPort: 7474
    boltPort: 7687
  auth:
    username: neo4j
    password: changeme
  plugins: '["apoc", "graph-data-science", "n10s"]'
  persistence:
    enabled: false
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# XFSC Federated Catalogue (requires neo4j, keycloak, postgresql with "fc" database)
federatedCatalogue:
  enabled: false
  replicaCount: 1
  image:
    repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/catalogue/fc-service-server
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  route:
    path: ""
  neo4j:
    uri: ""
    username: ""
    password: ""
  database:
    url: ""
    name: "fc"
    username: ""
    password: ""
  keycloak:
    authServerUrl: ""
    realm: "gaia-x"
    clientId: "federated-catalogue"
    clientSecret: "federated-catalogue-secret"
  verifySignatures: false
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  portal:
    enabled: false
    replicaCount: 1
    image:
      repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/catalogue/fc-demo-portal
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8088
    route:
      path: ""
    keycloak:
      clientId: ""
      clientSecret: ""
    extraEnv: []
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
