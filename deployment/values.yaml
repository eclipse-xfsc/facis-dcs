# Default values for digital-contracting-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: [registry]
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
  # - name: docker-registry

# Optional: Create a docker registry secret via Helm (credentials in values)
dockerRegistry:
  create: false
  secretName: "docker-registry"
  server: ""
  username: ""
  password: ""

# This is to override the chart name.
#nameOverride: ""
#fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8991

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  # Optional ingressClassName. Set per environment, e.g. nginx, traefik.
  className: ""
  # Provider-specific annotations (nginx/traefik/etc.) can be set from Argo values.
  annotations: {}

  # Default pathType used when a host path does not set one explicitly.
  pathType: Prefix

  hosts: []
    # - host: dcs.example.com
    #   # Leave empty to use the auto-generated path from route values below.
    #   # To override manually, provide one or more ingress paths here.
    #   paths: []
  
  # Optional TLS configuration. Configure per environment if needed.
  tls: []

# Istio VirtualService configuration (use instead of ingress for Istio service mesh)
istio:
  enabled: false
  # Hosts for the VirtualService (must match Gateway hosts)
  hosts: []
    # - market.asd-x.eu
  # External Gateway(s) to attach to (namespace/name format)
  gateways: []
    # - core/ingress-gateway-market-asd-x-eu

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
#livenessProbe:
#  httpGet:
#    path: /
#    port: http

#readinessProbe:
#  httpGet:
#    path: /
#    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# Custom CA certificates for HTTPS connections (e.g., self-signed Keycloak certs)
customCA:
  enabled: false
  # Name of the ConfigMap containing CA certificate(s)
  # The ConfigMap should have files with .crt extension
  configMapName: ""

# Host aliases for in-cluster DNS resolution (e.g., map keycloak.xfsc.local to Traefik ClusterIP)
# Example:
# hostAliases:
#   - ip: "10.43.99.151"
#     hostnames:
#       - "keycloak.xfsc.local"
hostAliases: []

nodeSelector: {}

tolerations: []

affinity: {}

# OIDC Configuration
oidc:
  # Leave empty to derive from in-chart keycloak settings below.
  issuerURL: ""
  clientID: "[oidc-client-id]"
  redirectURI: "[oidc-redirect-uri]"
  logoutRedirectURI: "[oidc-logout-redirect-uri]"
  # Used only when oidc.issuerURL is empty.
  realm: "dcs"
  keycloakScheme: "http"
  # Optional secret reference for OIDC_ISSUER_URL.
  # If set, it takes precedence over oidc.issuerURL and derived values.
  issuerURLSecretRef:
    name: ""
    key: "OIDC_ISSUER_URL"

# Route base path (Argo can set this per app/tenant), e.g.:
# /upstream/DCS_embedded_frontend/facis/digital-contracting-service
route:
  basePath: "/digital-contracting-service"

# Path configuration (both backend and frontend use these)
paths:
  # Optional manual override of API path. Leave empty for automatic route + /api.
  api: ""
  # Optional manual override of UI path. Leave empty for automatic route + /ui.
  ui: ""

# Connectivity for external or in-cluster dependencies.
# If the URL values below are set, they take precedence over in-chart defaults.
database:
  url: ""
  port: 5432
  # Leave empty to use postgresql.auth values when postgresql.enabled=true
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  # Optional secret reference for DATABASE_URL.
  # If set, it takes precedence over database.url and derived values.
  secretRef:
    name: ""
    key: "DATABASE_URL"

messaging:
  natsURL: ""
  natsPort: 4222
  # Optional secret reference for NATS_URL.
  # If set, it takes precedence over messaging.natsURL and derived values.
  secretRef:
    name: ""
    key: "NATS_URL"

# Optional explicit service host overrides when using in-chart dependencies
# or custom service names.
serviceDiscovery:
  postgresqlHost: ""
  keycloakHost: ""
  natsHost: ""
  # Optional keycloak port override used when deriving OIDC issuer URL.
  keycloakPort: ""

# Extra env vars and envFrom sources for custom integrations.
extraEnv: []
extraEnvFrom: []

# Optional in-chart dependency deployments (set enabled=true to co-deploy)
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    username: dcs
    password: dcs
    database: dcs
  persistence:
    enabled: false
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources: {}

keycloak:
  enabled: false
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
    pullPolicy: IfNotPresent
  service:
    # Use LoadBalancer to expose Keycloak externally without in-cluster TLS.
    type: ClusterIP
    port: 8080
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: ""
  # Route configuration for path-based access via main ingress.
  # When set, Keycloak is accessible at the same host as DCS but different path.
  route:
    # External path for Keycloak (e.g., "/auth"). Leave empty to disable.
    path: ""
  # Legacy separate-host ingress (use route.path instead for same-host setup).
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: "/"
    pathType: Prefix
    tls: []
  auth:
    adminUser: admin
    adminPassword: admin
  extraEnv: []
  # Import pre-configured DCS realm with client and roles on startup.
  # Only imports if the realm doesn't already exist.
  realm:
    import: false
  resources: {}

nats:
  enabled: false
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 4222
  resources: {}